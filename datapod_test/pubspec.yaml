name: datapod_test
description: Integration tests for the Datapod ORM framework.
version: 0.2.1
publish_to: none

environment:
  sdk: ^3.10.0

dependencies:
  test: ^1.24.0
  datapod_api: ^0.2.2
  datapod_postgres: ^0.2.2
  datapod_mysql: ^0.2.2
  datapod_sqlite: ^0.2.2
  datapod_engine: ^0.2.2
  logging: ^1.1.0
  yaml: ^3.1.1

dev_dependencies:
  lints: ^2.1.0
  build_runner: ^2.4.0
  datapod_generator:
    path: ../datapod_generator

dependency_overrides:
  datapod_api:
    path: ../datapod_api
  datapod_engine:
    path: ../datapod_engine
  datapod_postgres:
    path: ../datapod_postgres
  datapod_mysql:
    path: ../datapod_mysql
  datapod_sqlite:
    path: ../datapod_sqlite
  datapod_generator:
    path: ../datapod_generator
